<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقييم المصلحة ⭐</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; text-align: center; }
        .header { background-color: #1e88e5; color: white; padding: 20px; font-size: 1.3rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { padding: 30px 15px; }
        
        .rate-card { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .play-store-icon { font-size: 4rem; color: #1e88e5; margin-bottom: 20px; }
        
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; }
        
        .stars { color: #ffb300; font-size: 1.8rem; margin-bottom: 25px; }
        
        .btn-rate { 
            background-color: #1e88e5; 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            text-decoration: none; 
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(30, 136, 229, 0.3);
        }
        .btn-rate:active { transform: scale(0.95); }

        .btn-back { display: block; margin-top: 30px; color: #777; text-decoration: none; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">تقييم تطبيق المصلحة ⭐</div>

<div class="container">
    <div class="rate-card">
        <i class="fab fa-google-play play-store-icon"></i>
        <h2>رأيك يهمنا يا بطل!</h2>
        <p>تقييمك بـ 5 نجوم بيساعدنا نطور "المصلحة" ونوصل لعدد أكبر من المربين عشان الكل يستفيد.</p>
        
        <div class="stars">
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
        </div>

        <a href="https://play.google.com/store/apps/details?id=YOUR_APP_ID" class="btn-rate">
            قيمنا الآن على Google Play
        </a>
    </div>

    <a href="menu.html" class="btn-back">العودة للقائمه الرئيسيه</a>
</div>

</body>
</html>
