<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دليل الإنسان - VIP Assistant</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #050505, #1a1a1a); margin: 0; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 20px; background: rgba(255, 215, 0, 0.05); border-bottom: 1px solid #ffd700; text-align: center; }
        .header h2 { color: #ffd700; margin: 0; letter-spacing: 2px; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 15px 20px; border-radius: 20px; max-width: 80%; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .user { align-self: flex-end; background: linear-gradient(45deg, #00e5ff, #0077ff); color: #000; font-weight: bold; }
        .bot { align-self: flex-start; background: rgba(255,255,255,0.05); }
        .input-area { padding: 20px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 15px; border-radius: 30px; border: 1px solid #444; background: #111; color: white; outline: none; }
        button { background: #ffd700; border: none; padding: 0 25px; border-radius: 30px; font-weight: bold; color: #000; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>★ VIP ASSISTANT ★</h2>
    </div>

    <div id="chat-container">
        <div class="msg bot">أهلاً بك في النسخة الـ VIP من دليل استخدام الإنسان. كيف أخدمك اليوم؟</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب استفسارك هنا...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        const API_KEY = "AQ.Ab8RN6KDvTEF8Nhu5Ba06n6A6B_0XVO2L9iHF9ZfcxbRjTM06Q"; 
        let questionCount = 0;

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const chat = document.getElementById("chat-container");
            
            if (!input.value) return;

            // عداد الـ 5 أسئلة
            if (questionCount >= 5) {
                chat.innerHTML += `
                    <div class="msg bot" style="border: 2px solid #ffd700;">
                        <h3>🌟 اشتراك VIP</h3>
                        <p>انتهت المحاولات المجانية. اشترك الآن بـ 50 جنيهاً فقط!</p>
                        <p>حول المبلغ على فودافون كاش: <b>010xxxxxxxx</b></p>
                        <input type="text" id="transactionCode" placeholder="أدخل رقم العملية..." style="margin: 10px 0; width: 100%;">
                        <button onclick="sendRequest()">إرسال طلب التفعيل</button>
                    </div>`;
                chat.scrollTop = chat.scrollHeight;
                return;
            }

            chat.innerHTML += `<div class="msg user">${input.value}</div>`;
            const userMsg = input.value;
            input.value = "";
            questionCount++;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
    'Content-Type': 'application/json',
    'Origin': 'https://aistudio.google.com'
},
                    body: JSON.stringify({ contents: [{ parts: [{ text: userMsg }] }] })
                });
                
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg bot">${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                chat.innerHTML += `<div class="msg bot">خطأ في الاتصال. تأكد من الإنترنت!</div>`;
            }
        }

        function sendRequest() {
            const code = document.getElementById("transactionCode").value;
            const phone = "2010xxxxxxxx"; // حط رقم الواتساب بتاعك هنا
            const text = "أهلاً، أنا حاتم، قمت بالاشتراك في المساعد الذكي، كود العملية: " + code;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
